spring.application.name=Courseregister

# H2 In-Memory Database (no MySQL needed)
spring.datasource.url=jdbc:h2:mem:courseregisterdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# H2 Web Console (access at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Load seed data from data.sql after schema is created
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

